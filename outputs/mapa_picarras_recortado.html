<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa de Crescimento - picarras recortado</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
#mapa { width: 100%; height: 100vh; }
.info-box { position: absolute; bottom: 20px; right: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000; max-width: 350px; }
.info-box h3 { margin: 0 0 10px 0; color: #333; }
.info-box p { margin: 5px 0; color: #666; font-size: 0.9em; }
.crescimento-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-top: 5px; }
.crescimento { background-color: #FFE6E6; color: #D32F2F; }
.estavel { background-color: #FFF8E1; color: #F57F17; }
.diminuicao { background-color: #E3F2FD; color: #1976D2; }
</style>
</head>
<body>
<div id="mapa"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const dadosCidade = {"nome": "picarras recortado", "lat": -26.7638889, "lon": -48.6716667, "crescimento": -5.51, "cor": "#6699FF", "descricao": "Em decréscimo", "intensidade_inicial": 30.17, "intensidade_final": 28.5, "anos": "2014-2024"};
const mapa = L.map("mapa").setView([dadosCidade.lat, dadosCidade.lon], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap", maxZoom: 19 }).addTo(mapa);
L.circleMarker([dadosCidade.lat, dadosCidade.lon], { radius: 20, fillColor: dadosCidade.cor, color: "#333", weight: 2, opacity: 1, fillOpacity: 0.8 }).addTo(mapa);
const info = document.createElement("div");
info.className = "info-box";
const status = dadosCidade.crescimento > 0 ? "crescimento" : dadosCidade.crescimento < 0 ? "diminuicao" : "estavel";
info.innerHTML = `<h3>${dadosCidade.nome}</h3><p><strong>Taxa de Crescimento:</strong></p><div class="crescimento-badge ${status}">${dadosCidade.crescimento > 0 ? "+" : ""}${dadosCidade.crescimento}% (${dadosCidade.anos})</div><p style="margin-top: 10px;"><strong>Intensidade de Luz:</strong></p><p>Inicial (${dadosCidade.anos.split("-")[0]}): ${dadosCidade.intensidade_inicial}</p><p>Final (${dadosCidade.anos.split("-")[1]}): ${dadosCidade.intensidade_final}</p><p style="margin-top: 10px; font-size: 0.9em; color: #666;">${dadosCidade.descricao}</p>`;
const infoControl = L.Control.extend({onAdd: function() { return info; }});
new infoControl({position: "bottomright"}).addTo(mapa);
</script>
</body>
</html>
